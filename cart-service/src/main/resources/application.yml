server:
  port: 8085

spring:
  application:
    name: cart-service

  # Redis — cart's only data store
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  # IMPORTANT: No datasource config — cart-service has no SQL database

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  level:
    com.ecom.cart: DEBUG
